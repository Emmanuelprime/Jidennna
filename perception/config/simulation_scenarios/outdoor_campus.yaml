name: "outdoor_campus"
description: "Outdoor campus delivery scenario with vehicles and pedestrians"

robot_start:
  position: [0.0, 0.0, 1.57]  # Facing east

environment:
  size: [50.0, 50.0]
  ground_type: "pavement"

pedestrians:
  - start_position: [10.0, 3.0]
    goal_position: [-10.0, -3.0]
    speed: 1.4
  - start_position: [-5.0, 8.0]
    goal_position: [5.0, -8.0]
    speed: 1.1
  - start_position: [8.0, -5.0]
    goal_position: [-8.0, 5.0]
    speed: 1.3

vehicles:
  - position: [15.0, 0.0]
    velocity: [-3.0, 0.0]
    path: [[15.0, 0.0], [0.0, 0.0], [-15.0, 0.0]]
  - position: [-10.0, -5.0]
    velocity: [2.0, 0.0]
    path: [[-10.0, -5.0], [0.0, -5.0], [10.0, -5.0]]

static_obstacles:
  - position: [5.0, 5.0]
    radius: 0.5
    type: "bench"
  - position: [-3.0, -3.0]
    radius: 0.3
    type: "sign"